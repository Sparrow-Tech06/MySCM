<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>LogiLearn - Contents</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet"
    >

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #f7f8fa;
            font-family: Arial, sans-serif;
            color: #202124;
        }


        /* =========================
           HEADER
        ========================= */

        .app-header {
            height: 62px;
            background: #ffffff;
            border-bottom: 1px solid #eeeeee;

            display: flex;
            align-items: center;
        }

        .brand {
            text-decoration: none;
            color: #202124;

            font-size: 20px;
            font-weight: 700;
        }

        .brand-icon {
            color: #ff7a00;
            margin-right: 6px;
        }


        /* =========================
           PAGE HEADER
        ========================= */

        .page-header {
            padding: 28px 0 24px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .page-subtitle {
            color: #777;
            font-size: 14px;
            margin: 6px 0 0;
        }


        /* =========================
           TOPIC CARD
        ========================= */

        .topic-card {
            background: #ffffff;
            border: 1px solid #eeeeee;
            border-radius: 18px;
            padding: 20px;

            height: 100%;

            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.03);
        }


        /* =========================
           TOPIC HEADER
        ========================= */

        .topic-header {
            display: flex;
            align-items: center;

            padding-bottom: 15px;
            margin-bottom: 15px;

            border-bottom: 1px solid #f0f0f0;
        }


        .topic-icon {

            width: 48px;
            height: 48px;

            border-radius: 14px;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 21px;

            margin-right: 13px;

            flex-shrink: 0;
        }


        .topic-number {
            font-size: 11px;
            font-weight: 700;
            color: #999;

            letter-spacing: 0.6px;
        }


        .topic-title {
            font-size: 16px;
            font-weight: 700;

            margin: 3px 0 0;
        }


        /* =========================
           SUBTOPIC LINKS
        ========================= */

        .subtopic-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }


        .subtopic-link {

            display: flex;
            align-items: center;

            text-decoration: none;
            color: #444;

            background: #fafafa;

            border: 1px solid #f0f0f0;

            padding: 11px 12px;

            border-radius: 10px;

            font-size: 13px;

            transition: 0.2s ease;
        }


        .subtopic-link:hover {

            background: #ffffff;

            border-color: #ddd;

            transform: translateX(3px);

            color: #ff7200;
        }


        .subtopic-icon {

            font-size: 13px;

            margin-right: 9px;

            color: #aaa;
        }


        .subtopic-arrow {

            margin-left: auto;

            color: #bbb;

            font-size: 12px;
        }


        /* =========================
           NTH CHILD COLORS
        ========================= */

        .topic-item:nth-child(1) .topic-icon {
            background: #fff0df;
            color: #f57c00;
        }

        .topic-item:nth-child(2) .topic-icon {
            background: #e8f1ff;
            color: #1976d2;
        }

        .topic-item:nth-child(3) .topic-icon {
            background: #e8f7ed;
            color: #168a45;
        }

        .topic-item:nth-child(4) .topic-icon {
            background: #f1eaff;
            color: #7b3fc6;
        }

        .topic-item:nth-child(5) .topic-icon {
            background: #ffe9e9;
            color: #e53935;
        }

        .topic-item:nth-child(6) .topic-icon {
            background: #e5f8fa;
            color: #008c95;
        }

        .topic-item:nth-child(7) .topic-icon {
            background: #ffe9f2;
            color: #d63384;
        }

        .topic-item:nth-child(8) .topic-icon {
            background: #fff7d9;
            color: #c69200;
        }


        /* =========================
           MOBILE
        ========================= */

        @media (max-width: 575px) {

            .page-header {
                padding: 23px 0 20px;
            }

            .page-title {
                font-size: 21px;
            }

            .topic-card {
                padding: 16px;
                border-radius: 15px;
            }

            .topic-icon {
                width: 43px;
                height: 43px;
                border-radius: 12px;
            }

            .topic-title {
                font-size: 14px;
            }

        }

    </style>

</head>


<body>


<!-- =========================
     HEADER
========================= -->

<header class="app-header">

    <div class="container">

        <a href="index.html" class="brand">

            <i class="bi bi-box-seam-fill brand-icon"></i>

            LogiLearn

        </a>

    </div>

</header>



<!-- =========================
     MAIN
========================= -->

<main class="container">


    <div class="page-header">

        <h1 class="page-title">
            Learning Chapters
        </h1>

        <p class="page-subtitle">
            Learn Logistics & Supply Chain Management step by step
        </p>

    </div>


    <!-- JSON DATA WILL GENERATE HERE -->

    <div id="topicContainer" class="row g-3 pb-4"></div>


</main>



<script>


/* =================================
   LOGISTICS TOPIC JSON
================================= */

    {

        icon: "bi-box-seam",

        subtopics: [

            {
                title: "What is Logistics?",
                link: "what-is-logistics.html"
            },

            {
                title: "Importance of Logistics",
                link: "importance-of-logistics.html"
            },

            {
                title: "Objectives of Logistics",
                link: "logistics-objectives.html"
            },

            {
                title: "Types of Logistics",
                link: "types-of-logistics.html"
            }

        ]
    },


    {
        number: "CHAPTER 02",

        title: "Supply Chain Management",

        icon: "bi-diagram-3",

        subtopics: [

            {
                title: "What is Supply Chain?",
                link: "what-is-supply-chain.html"
            },

            {
                title: "Supply Chain Components",
                link: "supply-chain-components.html"
            },

            {
                title: "Supply Chain Process",
                link: "supply-chain-process.html"
            },

            {
                title: "Logistics vs Supply Chain",
                link: "logistics-vs-supply-chain.html"
            }

        ]
    },


    {
        number: "CHAPTER 03",

        title: "Procurement & Purchasing",

        icon: "bi-cart-check",

        subtopics: [

            {
                title: "What is Procurement?",
                link: "what-is-procurement.html"
            },

            {
                title: "Procurement Process",
                link: "procurement-process.html"
            },

            {
                title: "Purchasing Process",
                link: "purchasing-process.html"
            },

            {
                title: "Vendor Management",
                link: "vendor-management.html"
            }

        ]
    },


    {
        number: "CHAPTER 04",

        title: "Inventory Management",

        icon: "bi-boxes",

        subtopics: [

            {
                title: "What is Inventory?",
                link: "what-is-inventory.html"
            },

            {

            {

            },

            },

        ]

    {

    {

    },


    {
        number: "CHAPTER 07",

            },

            {
                title: "Export Basics",

            },

            {

            },

    {

        subtopics: [

            },

            },

            {
                title: "Demand Planning",
                link: "demand-planning.html"
            }

        ]
    }

];



/* =================================
   GENERATE HTML
================================= */

const container = document.getElementById("topicContainer");


topics.forEach((topic) => {


    /* Create Subtopic HTML */

    let subtopicHTML = "";


    topic.subtopics.forEach((subtopic) => {

        subtopicHTML += `

            <a href="${subtopic.link}" class="subtopic-link">

                <i class="bi bi-file-text subtopic-icon"></i>

                <span>
                    ${subtopic.title}
                </span>

                <i class="bi bi-chevron-right subtopic-arrow"></i>

            </a>

        `;

    });



    /* Create Topic Card */

    container.innerHTML += `

        <div class="col-12 col-md-6 col-lg-4 topic-item">

            <div class="topic-card">


                <div class="topic-header">

                    <div class="topic-icon">

                        <i class="bi ${topic.icon}"></i>

                    </div>


                    <div>

                        <div class="topic-number">

                            ${topic.number}

                        </div>

                        <h2 class="topic-title">

                            ${topic.title}

                        </h2>

                    </div>

                </div>



                <div class="subtopic-list">

                    ${subtopicHTML}

                </div>


            </div>

        </div>

    `;

});


</script>


</body>

  </html>
