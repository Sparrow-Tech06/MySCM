<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn · Subtopics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f4f7fc;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem 1rem;
      min-height: 100vh;
    }
    .learn-container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .header-section {
      background: white;
      border-radius: 32px;
      padding: 2rem 2.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
      border: 1px solid #e4ebf5;
      margin-bottom: 2.5rem;
    }
    .header-section .breadcrumb-item a {
      text-decoration: none;
      color: #3b82f6;
    }
    .header-section .breadcrumb-item a:hover {
      text-decoration: underline;
    }
    .header-section .topic-display {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .header-section .topic-display .emoji-large {
      font-size: 3rem;
      line-height: 1;
    }
    .header-section .topic-display h1 {
      font-weight: 700;
      color: #0b1b33;
      margin: 0;
    }
    .header-section .topic-display .subtopic-count {
      background: #eef4ff;
      color: #1e4a8a;
      border-radius: 60px;
      padding: 0.3rem 1.2rem;
      font-weight: 500;
      font-size: 0.85rem;
    }
    .subtopic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
    }
    .subtopic-card {
      background: white;
      border-radius: 18px;
      padding: 1.2rem 1.5rem;
      border: 1px solid #e2e9f2;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .subtopic-card:hover {
      transform: translateY(-3px);
      border-color: #b6caf0;
      box-shadow: 0 8px 20px -6px rgba(59, 130, 246, 0.1);
    }
    .subtopic-card a {
      text-decoration: none;
      color: #0b1b33;
      font-weight: 500;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .subtopic-card a i {
      color: #3b82f6;
      font-size: 1.2rem;
      width: 1.8rem;
      text-align: center;
    }
    .subtopic-card a .sub-name {
      flex: 1;
    }
    .subtopic-card a .link-icon {
      color: #94a3b8;
      font-size: 0.9rem;
      transition: 0.15s;
    }
    .subtopic-card a:hover .link-icon {
      color: #3b82f6;
      transform: translateX(3px);
    }
    .subtopic-card .index-badge {
      background: #f1f5f9;
      color: #475569;
      border-radius: 40px;
      padding: 0.1rem 0.7rem;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background: white;
      border-radius: 28px;
      border: 2px dashed #d4dee9;
    }
    .empty-state i {
      font-size: 4rem;
      color: #cbd5e1;
    }
    .loading-spinner {
      text-align: center;
      padding: 3rem;
    }
    .error-state {
      text-align: center;
      padding: 3rem;
      color: #dc3545;
    }
    .back-home-btn {
      border-radius: 60px;
      padding: 0.5rem 1.8rem;
      font-weight: 500;
      border: 1px solid #d0dcee;
      background: white;
      color: #1e293b;
      transition: 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .back-home-btn:hover {
      background: #f1f6fe;
      border-color: #3b82f6;
      color: #0b1b33;
    }
    @media (max-width: 576px) {
      .header-section {
        padding: 1.5rem;
      }
      .header-section .topic-display {
        flex-wrap: wrap;
      }
      .subtopic-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="learn-container">
  <!-- Header -->
  <div class="header-section" id="headerSection">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-1">
        <li class="breadcrumb-item"><a href="index.html"><i class="bi bi-house-door"></i> Home</a></li>
        <li class="breadcrumb-item active" id="breadcrumbTopic" aria-current="page">Topic</li>
      </ol>
    </nav>
    <div class="topic-display">
      <span class="emoji-large" id="topicEmoji">📌</span>
      <h1 id="topicTitle">Loading...</h1>
      <span class="subtopic-count" id="subtopicCount">0 subtopics</span>
      <div class="ms-auto">
        <a href="index.html" class="back-home-btn">
          <i class="bi bi-arrow-left"></i> Home
        </a>
      </div>
    </div>
    <p class="text-muted mt-2 mb-0" id="topicDescription">Description</p>
  </div>

  <!-- Subtopics Grid -->
  <div id="subtopicContainer" class="subtopic-grid">
    <div class="loading-spinner">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-2 text-muted">Loading subtopics...</p>
    </div>
  </div>

  <!-- URL info -->
  <div class="mt-4 pt-2 text-center text-muted small border-top border-light">
    <i class="bi bi-link-45deg me-1"></i> 
    learn.html?topic=<span id="urlParamDisplay" class="fw-semibold text-dark">—</span>
  </div>
</div>

<script>
  (function() {
    const container = document.getElementById('subtopicContainer');
    const topicTitle = document.getElementById('topicTitle');
    const topicEmoji = document.getElementById('topicEmoji');
    const topicDescription = document.getElementById('topicDescription');
    const breadcrumbTopic = document.getElementById('breadcrumbTopic');
    const subtopicCount = document.getElementById('subtopicCount');
    const urlParamDisplay = document.getElementById('urlParamDisplay');

    // Get topic from URL
    function getTopicFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('topic');
    }

    const topicName = getTopicFromURL();
    urlParamDisplay.textContent = topicName ? encodeURIComponent(topicName) : '—';

    if (!topicName) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="bi bi-search"></i>
          <h5 class="mt-3 fw-normal">No topic specified</h5>
          <p class="text-muted">Add <code>?topic=Artificial Intelligence</code> to the URL.</p>
          <div class="mt-3">
            <a href="?topic=Artificial Intelligence" class="btn btn-outline-primary btn-sm rounded-pill me-2">AI</a>
            <a href="?topic=Web Development" class="btn btn-outline-primary btn-sm rounded-pill me-2">Web</a>
            <a href="?topic=Data Science" class="btn btn-outline-primary btn-sm rounded-pill">Data</a>
          </div>
        </div>
      `;
      topicTitle.textContent = 'No topic selected';
      topicEmoji.textContent = '📂';
      topicDescription.textContent = 'Use ?topic=TOPIC_NAME in URL';
      breadcrumbTopic.textContent = '—';
      subtopicCount.textContent = '0 subtopics';
      return;
    }

    // Load JSON and render
    fetch('topics.json')
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
      })
      .then(data => {
        const topics = data.topics || data;
        if (!Array.isArray(topics)) {
          throw new Error('Invalid JSON format: expected array of topics');
        }

        // Find the topic
        const topicData = topics.find(t => t.topic === topicName);

        if (!topicData) {
          container.innerHTML = `
            <div class="error-state">
              <i class="bi bi-exclamation-triangle-fill fs-1"></i>
              <h5 class="mt-3">Topic not found</h5>
              <p class="text-muted">"${topicName}" does not exist in topics.json</p>
              <div class="mt-3">
                <a href="index.html" class="btn btn-primary rounded-pill">
                  <i class="bi bi-arrow-left"></i> Back to Home
                </a>
              </div>
            </div>
          `;
          topicTitle.textContent = `❓ "${topicName}"`;
          topicEmoji.textContent = '⚠️';
          topicDescription.textContent = 'Topic not found in JSON';
          breadcrumbTopic.textContent = 'Not found';
          subtopicCount.textContent = '0 subtopics';
          return;
        }

        // Update header
        topicTitle.textContent = topicData.topic;
        topicEmoji.textContent = topicData.emoji || '📌';
        topicDescription.textContent = topicData.description || '';
        breadcrumbTopic.textContent = topicData.topic;

        const subtopics = topicData.subtopics || [];
        subtopicCount.textContent = `${subtopics.length} subtopics`;

        // Render subtopics
        container.innerHTML = '';
        if (subtopics.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="bi bi-inbox"></i>
              <h5 class="mt-3 fw-normal">No subtopics</h5>
              <p class="text-muted">This topic has no subtopics defined.</p>
            </div>
          `;
          return;
        }

        subtopics.forEach((sub, index) => {
          const card = document.createElement('div');
          card.className = 'subtopic-card';

          const link = document.createElement('a');
          link.href = sub.link || '#';
          link.target = '_blank';
          link.rel = 'noopener noreferrer';

          link.innerHTML = `
            <i class="bi bi-chevron-right-circle"></i>
            <span class="sub-name">${sub.name}</span>
            <span class="index-badge">#${index + 1}</span>
            <i class="bi bi-box-arrow-up-right link-icon"></i>
          `;

          card.appendChild(link);
          container.appendChild(card);
        });
      })
      .catch(error => {
        console.error('Error loading topics.json:', error);
        container.innerHTML = `
          <div class="error-state">
            <i class="bi bi-exclamation-triangle-fill fs-1"></i>
            <h5 class="mt-3">Failed to load topics.json</h5>
            <p class="text-muted">${error.message}</p>
            <p class="text-muted small">Make sure topics.json is in the same folder.</p>
            <div class="mt-3">
              <a href="index.html" class="btn btn-primary rounded-pill">
                <i class="bi bi-arrow-left"></i> Back to Home
              </a>
            </div>
          </div>
        `;
      });
  })();
</script>
</body>
</html>
